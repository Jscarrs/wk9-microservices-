<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management</title>
</head>
<body>
<div th:if="${message}" th:text="${message}"></div>

<h1>Order Management</h1>
<p>Store a new order in MySQL.</p>

<form th:action="@{/orders/store}" method="post">
    <div>
        <label for="accountId">Account ID</label>
        <input id="accountId" type="text" name="accountId" required>
    </div>
    <div>
        <label for="stockSymbol">Stock Symbol</label>
        <input id="stockSymbol" type="text" name="stockSymbol" required>
    </div>
    <div>
        <label for="price">Price</label>
        <input id="price" type="number" step="0.01" min="0" name="price" required>
    </div>
    <div>
        <label for="quantity">Quantity</label>
        <input id="quantity" type="number" min="1" name="quantity" required>
    </div>
    <div>
        <label for="orderType">Order Type</label>
        <select id="orderType" name="orderType">
            <option value="BUY">BUY</option>
            <option value="SELL">SELL</option>
        </select>
    </div>
    <div>
        <button type="submit">Store Order Data</button>
    </div>
</form>

<h2>Stored Orders</h2>
<table border="1" cellpadding="6">
    <thead>
    <tr>
        <th>Order ID</th>
        <th>Date</th>
        <th>Account</th>
        <th>Quote</th>
        <th>Price</th>
        <th>Qty</th>
        <th>Type</th>
        <th>Status</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="order : ${orders}">
        <td th:text="${order.orderId}"></td>
        <td th:text="${order.orderDate}"></td>
        <td th:text="${order.accountId}"></td>
        <td th:text="${order.stockSymbol}"></td>
        <td th:text="${order.price}"></td>
        <td th:text="${order.quantity}"></td>
        <td th:text="${order.orderType}"></td>
        <td th:text="${order.status}"></td>
    </tr>
    <tr th:if="${#lists.isEmpty(orders)}">
        <td colspan="8">No orders stored yet.</td>
    </tr>
    </tbody>
</table>
</body>
</html>
